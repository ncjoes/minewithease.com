<% _.each(events, function(event){ %>
<div class="cal-row-fluid">
    <div class="cal-cell<%= event.days%> cal-offset<%= event.start_day %> day-highlight dh-<%= event['class'] %>"
         data-event-class="<%= event['class'] %>">
        <a class="cal-event-week event<%= event.id %>" data-event-id="<%= event.id %>"
           href="<%= event.url ? event.url : 'javascript:void(0)' %>"><%= event.title %></a>
    </div>
</div>
<% }); %>
